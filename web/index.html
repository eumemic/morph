<!doctype html>
<html lang="en" class="">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Morph · agent dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="app" data-theme="dark" data-accent="violet">
    <header id="topbar">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true"></span>
        <span class="brand-name">Morph</span>
        <span class="brand-sub">declarative agent UI</span>
      </div>
      <h1 id="title" class="topbar-title">Connecting…</h1>
      <div id="status" class="status" data-state="connecting" title="stream status">
        <span class="status-dot" aria-hidden="true"></span>
        <span class="status-text"></span>
      </div>
    </header>

    <div id="ticker" class="ticker" aria-live="polite"></div>

    <main id="stage" class="stage" aria-label="agent dashboard"></main>

    <footer class="footnote">
      The agent communicates by reshaping this dashboard. Motion is
      <em>derived from the diff</em>, never authored — see <code>stager.js</code>.
    </footer>

    <!-- The always-available primary human→agent channel. Widgets the agent
         presents are a secondary channel; this text box is always here. -->
    <form id="composer" class="composer" autocomplete="off">
      <span class="composer-mark" aria-hidden="true">›</span>
      <input id="composer-input" class="composer-input" type="text"
             placeholder="Message the agent…  (it answers by reshaping the dashboard)"
             aria-label="Message the agent" />
      <button id="composer-send" class="composer-send" type="submit" aria-label="Send message">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </form>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
